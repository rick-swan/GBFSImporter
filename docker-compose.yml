name: gbfs-testing

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: gbfs-sqlserver-2025
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Yukon2025!Gbfs"
      MSSQL_PID: "Developer"
    ports:
      - "${GBFS_SQL_PORT:-51919}:1433"
    volumes:
      - gbfs-sqldata:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  gbfs-sqldata:
